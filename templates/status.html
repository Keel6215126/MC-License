<section class="panel status-panel hidden" data-status-panel>
  <div class="status-head"><div><span class="status-pill" data-status-pill>Queued</span><h2 data-status-title>Preparing build</h2></div><div class="spinner" data-spinner></div></div>
  <p data-status-message>The build will begin shortly.</p>
  <pre class="error-box hidden" data-error-box></pre>
  <div class="result-grid hidden" data-result-grid>
    <div><span>Detected</span><strong data-frameworks>—</strong></div>
    <div><span>Renamed classes</span><strong data-renamed-count>—</strong></div>
    <div><span>ProGuard time</span><strong data-elapsed>—</strong></div>
    <div class="wide"><span>Entry classes</span><strong data-entry-classes>—</strong></div>
  </div>
  <div class="downloads hidden" data-downloads><a class="button" data-jar-download href="#">Download final JAR</a><a class="button secondary" data-bundle-download href="#">Download build bundle</a></div>
</section>
